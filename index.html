<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover App - PBC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .alert-last-shift { border-left: 5px solid #2c3e50; background-color: #fff; }
        .table-responsive { font-size: 0.75rem; }
    </style>
</head>
<body class="p-3">

<div class="container" style="max-width: 500px;">
    <div id="loginBox" class="card p-4 mt-5">
        <h4 class="text-center fw-bold mb-4">MASUK SISTEM</h4>
        <input type="password" id="pinInput" class="form-control form-control-lg text-center mb-3" placeholder="PIN 4-DIGIT" inputmode="numeric">
        <button id="btnLogin" onclick="login()" class="btn btn-primary btn-lg w-100">LOGIN</button>
    </div>

    <div id="formBox" class="card p-4 hidden">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
                <h5 id="uNama" class="fw-bold mb-0 text-primary"></h5>
                <small id="uInfo" class="text-muted"></small>
            </div>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">Keluar</button>
        </div>

        <div id="adminTools" class="hidden mb-3">
            <button class="btn btn-dark btn-sm w-100" onclick="loadAllLogs()" data-bs-toggle="modal" data-bs-target="#logModal">
                🔍 Lihat Daftar Semua Log Serah Terima
            </button>
        </div>

        <div id="lastShiftBox" class="alert alert-last-shift hidden mb-4">
            <small class="fw-bold text-uppercase d-block mb-1">Catatan Shift Sebelumnya:</small>
            <div id="lastContent" class="small italic"></div>
        </div>

        <form id="hForm">
            <div class="row g-2 mb-3">
                <div class="col-7">
                    <label class="small fw-bold">Tanggal Kerja</label>
                    <input type="date" id="f_tgl" class="form-control" required>
                </div>
                <div class="col-5">
                    <label class="small fw-bold">Shift</label>
                    <select id="f_shift" class="form-select" required></select>
                </div>
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Catatan Utama (all)</label>
                <textarea id="f_catatan" class="form-control" rows="3" placeholder="Instruksi..."></textarea>
            </div>
            <div id="divCS" class="hidden border-top pt-3 mt-3">
                <h6 class="fw-bold text-info">Laporan Cleaning Service</h6>
                <input type="text" id="cs_dalam" class="form-control mb-2" placeholder="Area Dalam Gedung">
                <input type="text" id="cs_luar" class="form-control mb-2" placeholder="Area Luar Gedung">
                <input type="text" id="cs_tps" class="form-control mb-2" placeholder="Status TPS">
                <input type="text" id="cs_alat" class="form-control mb-2" placeholder="Kondisi Peralatan">
            </div>
            <div id="divSP" class="hidden border-top pt-3 mt-3">
                <h6 class="fw-bold text-warning">Laporan Security & Parkir</h6>
                <input type="text" id="sp_safety" class="form-control mb-2" placeholder="General Safety">
                <input type="text" id="sp_guard" class="form-control mb-2" placeholder="Guard Tour">
                <input type="text" id="sp_carcall" class="form-control mb-2" placeholder="Area Parkir">
            </div>
            <button type="submit" id="btnSubmit" class="btn btn-success btn-lg w-100 mt-4">KIRIM SERAH TERIMA</button>
        </form>
    </div>
</div>

<div class="modal fade" id="logModal" tabindex="-1">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Riwayat Log Serah Terima</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="table-responsive">
            <table class="table table-sm table-striped" id="logTable">
                <thead class="table-dark"><tr><th>Nama</th><th>Tgl</th><th>Shift</th><th>Div</th><th>Catatan</th></tr></thead>
                <tbody id="logBody"><tr><td colspan="5" class="text-center">Memuat data...</td></tr></tbody>
            </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw6t0z1m3wIt_eyLpnIs4T_GaN80jI0bRpp8sThJWZkyxgsyiqZCaqY_3UuPDonun3Y/exec"; 
    let user = {};

    async function login() {
        const pin = document.getElementById('pinInput').value;
        const btn = document.getElementById('btnLogin');
        if(!pin) return;
        btn.disabled = true; btn.innerText = "Memverifikasi...";
        try {
            const res = await fetch(`${API_URL}?pin=${pin}`);
            const data = await res.json();
            if(data.status === "success") {
                user = data;
                setupUI();
            } else {
                alert("PIN Salah!");
                btn.disabled = false; btn.innerText = "LOGIN";
            }
        } catch(e) { alert("Error Koneksi"); btn.disabled = false; }
    }

    function setupUI() {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('formBox').classList.remove('hidden');
        document.getElementById('uNama').innerText = user.nama;
        document.getElementById('uInfo').innerText = `${user.divisi} | Class: ${user.class}`;
        document.getElementById('f_tgl').valueAsDate = new Date();

        // Tampilkan Tombol Riwayat jika Class bukan 'user'
        if(user.class === "admin" || user.class === "SPV") {
            document.getElementById('adminTools').classList.remove('hidden');
        }

        if(user.lastShift) {
            document.getElementById('lastShiftBox').classList.remove('hidden');
            document.getElementById('lastContent').innerHTML = `<strong>${user.lastShift.pengirim} (${user.lastShift.shift}):</strong><br><em>"${user.lastShift.catatan || '-'}"</em>`;
        }

        const sSelect = document.getElementById('f_shift');
        let sList = (user.divisi === "CS") ? ["Pagi", "Siang", "Malam"] : ["Pagi", "Malam"];
        sList.forEach(s => { let opt = document.createElement('option'); opt.value = opt.text = s; sSelect.add(opt); });

        if(user.divisi === "CS") document.getElementById('divCS').classList.remove('hidden');
        if(user.divisi === "SP") document.getElementById('divSP').classList.remove('hidden');
    }

    async function loadAllLogs() {
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Memuat...</td></tr>';
        try {
            const res = await fetch(`${API_URL}?action=getAllLogs`);
            const data = await res.json();
            let html = "";
            // Lewati baris header (index 0, 1, 2)
            for(let i = data.length-1; i >= 2; i--) {
                html += `<tr>
                    <td>${data[i][1]}</td>
                    <td>${new Date(data[i][2]).toLocaleDateString('id-ID')}</td>
                    <td>${data[i][3]}</td>
                    <td>${data[i][4]}</td>
                    <td>${data[i][5]}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
        } catch(e) { alert("Gagal memuat log"); }
    }

    document.getElementById('hForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Mengirim...";
        const body = {
            nama: user.nama, tanggal: document.getElementById('f_tgl').value, shift: document.getElementById('f_shift').value, divisi: user.divisi, catatan: document.getElementById('f_catatan').value,
            cs_dalam: document.getElementById('cs_dalam')?.value || "", cs_luar: document.getElementById('cs_luar')?.value || "", cs_tps: document.getElementById('cs_tps')?.value || "", cs_alat: document.getElementById('cs_alat')?.value || "",
            sp_safety: document.getElementById('sp_safety')?.value || "", sp_guard: document.getElementById('sp_guard')?.value || "", sp_carcall: document.getElementById('sp_carcall')?.value || ""
        };
        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(body) });
            alert("Laporan Terkirim!");
            location.reload();
        } catch(e) { alert("Gagal Simpan"); btn.disabled = false; }
    });
</script>
</body>
</html>
